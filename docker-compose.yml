services:
    postgres:
        image: postgres:17
        container_name: "${APP_NAME}_POSTGRES_${NODE_ENV}"
        restart: unless-stopped
        env_file:
            - "${ENV_FILE}"
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        ports:
            - "127.0.0.1:${POSTGRES_EXTERNAL_PORT}:${POSTGRES_PORT}"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - ${NODE_ENV}-network

    redis:
        image: redis:7.2
        container_name: "${APP_NAME}_REDIS_${NODE_ENV}"
        restart: unless-stopped
        env_file:
            - "${ENV_FILE}"
        environment:
            REDIS_USER: ${REDIS_USER}
            REDIS_PASSWORD: ${REDIS_PASSWORD}
            REDIS_DB: ${REDIS_DB}
        command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
        ports:
            - "127.0.0.1:${REDIS_EXTERNAL_PORT}:${REDIS_PORT}"
        volumes:
            - redis_data:/data
        networks:
            - ${NODE_ENV}-network

    backend-dev:
        build:
            context: .
            dockerfile: docker/Dockerfile
            target: development
            args:
                NODE_VERSION: ${NODE_VERSION}
        container_name: "${APP_NAME}_APP_DEVELOPMENT"
        restart: unless-stopped
        depends_on:
            - postgres
            - redis
        env_file:
            - "${ENV_FILE}"
        command: ["npm", "run", "start:dev"]
        ports:
            - "${APP_EXTERNAL_PORT}:${APP_PORT}"
        volumes:
            - .:/app
            - node_modules:/app/node_modules
        networks:
            - development-network
        profiles:
            - development

    backend:
        build:
            context: .
            dockerfile: docker/Dockerfile
            target: production
            args:
                NODE_VERSION: ${NODE_VERSION}
        container_name: "${APP_NAME}_APP_PRODUCTION"
        restart: unless-stopped
        depends_on:
            - postgres
            - redis
        env_file:
            - "${ENV_FILE}"
        command: ["sh", "-c", "npm run migrate:prod && npm run start:prod"]
        ports:
            - "${APP_EXTERNAL_PORT}:${APP_PORT}"
        networks:
            - production-network
        profiles:
            - production

    db-backup:
        build: ./docker/postgres-backup
        container_name: "${APP_NAME}_DB_BACKUP"
        depends_on:
            - postgres
        env_file:
            - "${ENV_FILE}"
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        volumes:
            - ./backups:/backups
        networks:
            - production-network
        profiles:
            - production

networks:
    development-network:
        driver: bridge
    production-network:
        driver: bridge

volumes:
    postgres_data:
    redis_data:
    node_modules:
    backups:
